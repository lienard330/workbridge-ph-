<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applicants — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Applicants</h1>
        <div class="mb-4">
          <label class="form-label">Select Job</label>
          <select id="job-select" class="form-select" style="max-width:300px"></select>
        </div>
        <div id="applicants-list"></div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { getEmployerJobs } from '../assets/js/employer.module.js';
    import { apiJobApplications } from '../assets/js/api.js';
    import { esc } from '../assets/js/utils.js';

    renderLayout('employer', 'Applicants');

    const sel = document.getElementById('job-select');
    const list = document.getElementById('applicants-list');
    list.innerHTML = '<p class="text-secondary">Loading…</p>';

    async function renderApps() {
      if (!sel.value) { list.innerHTML = '<div class="empty-state"><p>Select a job above.</p></div>'; return; }
      list.innerHTML = '<p class="text-secondary">Loading applicants…</p>';
      try {
        const res = await apiJobApplications(sel.value);
        const apps = res.data || res;
        if (!apps.length) { list.innerHTML = '<div class="empty-state"><p>No applicants for this job.</p></div>'; return; }
        list.innerHTML = apps.map(a => {
          const name = a.seeker?.user?.name || 'Applicant';
          const skills = (a.seeker?.skills || []).map(s => s.skill || s).join(', ');
          return `
            <div class="card mb-2">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <h5 class="mb-1">${esc(name)}</h5>
                  ${skills ? `<p class="text-muted small mb-1">${esc(skills)}</p>` : ''}
                  <span class="badge badge-${esc(a.status.toLowerCase())}">${esc(a.status)}</span>
                  ${a.skill_fit != null ? `<span class="ms-2 text-muted small">Fit: ${a.skill_fit}%</span>` : ''}
                </div>
                <a href="applicant-detail.html?id=${esc(a.id)}" class="btn btn-primary btn-sm">View</a>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        list.innerHTML = `<p class="text-danger">${esc(err.message)}</p>`;
      }
    }

    getEmployerJobs().then(jobs => {
      sel.innerHTML = '<option value="">— Select a job —</option>';
      jobs.forEach(j => sel.add(new Option(j.title, j.id)));
      if (jobs[0]) { sel.value = jobs[0].id; renderApps(); }
      else list.innerHTML = '<div class="empty-state"><p>No jobs posted yet.</p></div>';
    });

    sel.onchange = renderApps;
  </script>
</body>
</html>
