<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Profile — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Company Profile</h1>
        <div class="card">
          <div class="card-body" id="company-form"><p class="text-secondary">Loading…</p></div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiMyCompany, apiUpdateCompany } from '../assets/js/api.js';
    import { toastSuccess, toastError } from '../assets/js/ui.toast.js';
    import { esc } from '../assets/js/utils.js';

    renderLayout('employer', 'Company Profile');

    const el = document.getElementById('company-form');

    function renderForm(co) {
      co = co || {};
      el.innerHTML =
        '<form id="co-form">' +
          '<div class="form-group mb-3"><label class="form-label">Company Name *</label>' +
            '<input type="text" name="name" class="form-input" value="' + esc(co.name || '') + '" required></div>' +
          '<div class="row"><div class="col-md-6">' +
            '<div class="form-group mb-3"><label class="form-label">Industry</label>' +
              '<input type="text" name="industry" class="form-input" value="' + esc(co.industry || '') + '" placeholder="e.g. Technology"></div></div>' +
          '<div class="col-md-6">' +
            '<div class="form-group mb-3"><label class="form-label">Company Size</label>' +
              '<select name="size" class="form-select">' +
                '<option value="">Select size</option>' +
                ['1-10','11-50','51-200','201-500','500+'].map(s => '<option value="' + s + '"' + (s === (co.size || '') ? ' selected' : '') + '>' + s + ' employees</option>').join('') +
              '</select></div></div></div>' +
          '<div class="row"><div class="col-md-6">' +
            '<div class="form-group mb-3"><label class="form-label">City</label>' +
              '<input type="text" name="city" class="form-input" value="' + esc(co.city || '') + '" placeholder="e.g. Manila"></div></div>' +
          '<div class="col-md-6">' +
            '<div class="form-group mb-3"><label class="form-label">Province</label>' +
              '<input type="text" name="province" class="form-input" value="' + esc(co.province || '') + '"></div></div></div>' +
          '<div class="form-group mb-3"><label class="form-label">Website</label>' +
            '<input type="url" name="website" class="form-input" value="' + esc(co.website || '') + '" placeholder="https://"></div>' +
          '<div class="form-group mb-3"><label class="form-label">Description</label>' +
            '<textarea name="description" class="form-textarea" rows="4">' + esc(co.description || '') + '</textarea></div>' +
          '<button type="submit" class="btn btn-primary">Save Profile</button>' +
        '</form>';

      document.getElementById('co-form').onsubmit = async function(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true;
        try {
          await apiUpdateCompany({
            name: fd.get('name'),
            industry: fd.get('industry'),
            size: fd.get('size'),
            city: fd.get('city'),
            province: fd.get('province'),
            website: fd.get('website'),
            description: fd.get('description'),
          });
          toastSuccess('Company profile saved');
        } catch (err) { toastError(err.message); }
        finally { btn.disabled = false; }
      };
    }

    apiMyCompany()
      .then(co => renderForm(co))
      .catch(() => renderForm(null));
  </script>
</body>
</html>
