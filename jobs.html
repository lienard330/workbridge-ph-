<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/public.css">
</head>
<body>
  <header class="public-nav">
    <div class="public-nav-inner">
      <a href="index.html" class="public-nav-brand"><img src="assets/img/logo.png" alt="" class="public-nav-logo"><span>WorkBridge PH</span></a>
      <ul class="public-nav-links">
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="auth/login.html" class="btn btn-primary">Log in</a></li>
      </ul>
    </div>
  </header>

  <main class="container page-transition py-4">
    <h1 class="mb-4">Browse Jobs</h1>
    <div class="card mb-4">
      <div class="card-body">
        <form class="row g-3" id="filter-form">
          <div class="col-md-3"><input type="text" name="keyword" class="form-input" placeholder="Keyword" id="f-keyword"></div>
          <div class="col-md-2"><input type="text" name="location" class="form-input" placeholder="Location" id="f-location"></div>
          <div class="col-md-2">
            <select name="type" class="form-select" id="f-type">
              <option value="">Job Type</option>
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
            </select>
          </div>
          <div class="col-md-2">
            <select name="setup" class="form-select" id="f-setup">
              <option value="">Setup</option>
              <option value="Remote">Remote</option>
              <option value="Hybrid">Hybrid</option>
              <option value="On-site">On-site</option>
            </select>
          </div>
          <div class="col-md-2">
            <select name="sort" class="form-select" id="f-sort">
              <option value="">Sort by</option>
              <option value="newest">Newest</option>
              <option value="salary">Salary (High)</option>
            </select>
          </div>
          <div class="col-md-1"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i></button></div>
        </form>
      </div>
    </div>
    <div id="active-filter-banner" class="mb-3" hidden></div>
    <div id="jobs-list" class="jobs-grid"></div>
    <div id="pagination" class="pagination mt-4"></div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="assets/js/app.js"></script>
  <script type="module">
    import { getJobsWithCompanies } from './assets/js/jobs.module.js';
    import { getQueryParams, buildQueryString } from './assets/js/router.js';
    import { getCurrentUser } from './assets/js/store.js';
    import { apiSaveJob, apiUnsaveJob, apiSavedJobs, apiGetCategories } from './assets/js/api.js';
    import { openModal } from './assets/js/ui.modal.js';
    import { toastSuccess, toastError } from './assets/js/ui.toast.js';
    import { esc, formatSalaryRange, companyAvatar, verifiedBadge, emptyState, skeletonJobCards } from './assets/js/utils.js';

    const user = getCurrentUser();
    let savedIds = new Set();
    let categoriesById = {};

    // Fetch category names once so we can show "Filtered: IT" banner instead of just the ID.
    apiGetCategories().then(res => {
      (res.data || res).forEach(c => { categoriesById[c.id] = c; });
      const params = getQueryParams();
      if (params.category) renderCategoryBanner(params.category);
    }).catch(() => {});

    function renderCategoryBanner(catId) {
      const cat = categoriesById[catId];
      const banner = document.getElementById('active-filter-banner');
      if (!cat) { banner.hidden = true; return; }
      banner.hidden = false;
      banner.innerHTML = `
        <div class="d-flex align-items-center gap-2 p-2 px-3" style="background:var(--color-accent-muted);border-radius:var(--radius-md);width:fit-content">
          <i class="bi ${esc(cat.icon || 'bi-tag')}"></i>
          <span>Showing jobs in <strong>${esc(cat.name)}</strong></span>
          <a href="jobs.html" class="ms-2" title="Clear filter"><i class="bi bi-x-lg"></i></a>
        </div>`;
    }

    async function loadSaved() {
      if (!user) return;
      try {
        const res = await apiSavedJobs();
        savedIds = new Set((res.data || res).map(s => s.job_listing_id));
      } catch {}
    }

    async function render() {
      const params = getQueryParams();
      const grid = document.getElementById('jobs-list');
      grid.innerHTML = skeletonJobCards(6);

      ['keyword','location','type','setup','sort'].forEach(k => {
        const el = document.getElementById('f-' + k);
        if (el && params[k]) el.value = params[k];
      });

      try {
        const { jobs, lastPage, currentPage } = await getJobsWithCompanies({ ...params, page: params.page || 1 });

        if (!jobs.length) {
          grid.innerHTML = emptyState({
            icon: 'search',
            title: 'No jobs match your filters',
            subtitle: 'Try removing some filters or searching for different keywords.',
          });
          return;
        }

        grid.innerHTML = jobs.map(j => `
          <div class="job-card card-lift">
            <div class="d-flex justify-content-between align-items-start gap-3">
              <div class="d-flex gap-3 align-items-start" style="min-width:0;flex:1">
                ${companyAvatar(j.company, 48)}
                <div style="min-width:0">
                  <a href="job-detail.html?id=${esc(j.id)}" class="text-dark text-decoration-none"><h3 class="job-card-title">${esc(j.title)}</h3></a>
                  <p class="job-card-company">${esc(j.company?.name || 'Company')}${verifiedBadge(j.company)}</p>
                </div>
              </div>
              <button class="btn btn-ghost btn-sm save-job flex-shrink-0" data-id="${esc(j.id)}" title="Save job">
                <i class="bi bi-${savedIds.has(j.id) ? 'bookmark-fill' : 'bookmark'}"></i>
              </button>
            </div>
            <div class="job-card-meta">
              <span><i class="bi bi-geo-alt"></i> ${esc(j.location)}</span>
              <span><i class="bi bi-briefcase"></i> ${esc(j.type)}</span>
            </div>
            <p class="job-card-salary mb-0">${formatSalaryRange(j.salaryMin, j.salaryMax)}</p>
          </div>
        `).join('');

        grid.querySelectorAll('.save-job').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = parseInt(btn.dataset.id);
            if (!user) {
              openModal({ title: 'Login Required', body: '<p>Please log in to save jobs.</p>', footer: '<a href="auth/login.html" class="btn btn-primary">Log in</a>' });
              return;
            }
            try {
              if (savedIds.has(id)) {
                await apiUnsaveJob(id);
                savedIds.delete(id);
                toastSuccess('Job removed from saved');
              } else {
                await apiSaveJob(id);
                savedIds.add(id);
                toastSuccess('Job saved');
              }
              btn.querySelector('i').className = `bi bi-${savedIds.has(id) ? 'bookmark-fill' : 'bookmark'}`;
            } catch (err) {
              toastError(err.message);
            }
          });
        });

        const pag = document.getElementById('pagination');
        if (lastPage <= 1) { pag.innerHTML = ''; return; }
        let html = '';
        if (currentPage > 1) html += `<button data-page="${currentPage - 1}">Previous</button>`;
        for (let i = 1; i <= lastPage; i++) html += `<button class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        if (currentPage < lastPage) html += `<button data-page="${currentPage + 1}">Next</button>`;
        pag.innerHTML = html;
        pag.querySelectorAll('button').forEach(b => {
          b.addEventListener('click', () => {
            window.location.search = buildQueryString({ ...params, page: b.dataset.page });
          });
        });
      } catch (err) {
        grid.innerHTML = `<p class="text-danger p-3">Error loading jobs: ${esc(err.message)}</p>`;
      }
    }

    document.getElementById('filter-form').addEventListener('submit', (e) => {
      e.preventDefault();
      // Preserve category from URL across form submissions — otherwise user
      // searching while filtered by category would lose their category filter.
      const existing = getQueryParams();
      const p = {
        keyword: document.getElementById('f-keyword').value,
        location: document.getElementById('f-location').value,
        type: document.getElementById('f-type').value,
        sort: document.getElementById('f-sort').value,
        category: existing.category || '',
      };
      window.location.href = 'jobs.html' + buildQueryString(p);
    });

    loadSaved().then(render);
  </script>
</body>
</html>
