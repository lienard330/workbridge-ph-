<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="card-body p-4">
        <a href="../index.html" class="auth-card-brand text-dark text-decoration-none fw-bold">
          <img src="../assets/img/logo.png" alt="" class="auth-card-logo">
          <span>WorkBridge PH</span>
        </a>
        <h1 class="h4 mb-4">Create account</h1>
        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input type="text" name="name" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="pw-wrap">
              <input type="password" name="password" class="form-input" required minlength="6">
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <div class="pw-wrap">
              <input type="password" name="password_confirmation" class="form-input" required minlength="6">
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">I am a</label>
            <select name="role" class="form-select" required>
              <option value="seeker">Job Seeker</option>
              <option value="employer">Employer</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="mt-3 text-center text-secondary small"><a href="login.html">Already have an account? Log in</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script>
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.pw-wrap').querySelector('input');
        const icon  = btn.querySelector('i');
        const show  = input.type === 'password';
        input.type  = show ? 'text' : 'password';
        icon.classList.toggle('bi-eye', !show);
        icon.classList.toggle('bi-eye-slash', show);
      });
    });
  </script>
  <script type="module">
    import { register, getRedirectAfterLogin } from './../assets/js/auth.js';
    import { toastError, toastSuccess } from './../assets/js/ui.toast.js';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      const fd = new FormData(e.target);
      const result = await register({
        name: fd.get('name'),
        email: fd.get('email'),
        password: fd.get('password'),
        password_confirmation: fd.get('password_confirmation'),
        role: fd.get('role')
      });
      if (result.ok) {
        toastSuccess('Account created!');
        setTimeout(() => {
          window.location.href = getRedirectAfterLogin(result.user);
        }, 300);
      } else {
        toastError(result.error);
        btn.disabled = false;
        btn.textContent = 'Register';
      }
    });
  </script>
</body>
</html>
