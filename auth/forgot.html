<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="card-body p-4">
        <a href="../index.html" class="auth-card-brand text-dark text-decoration-none fw-bold">
          <img src="../assets/img/logo.png" alt="" class="auth-card-logo">
          <span>WorkBridge PH</span>
        </a>
        <h1 class="h4 mb-2">Forgot password</h1>
        <p class="text-secondary small mb-4">Enter your email and we'll send you a link to reset your password.</p>

        <form id="forgot-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-primary w-100" id="submit-btn">Send reset link</button>
        </form>

        <!-- Demo notice (replaces email in capstone build) -->
        <div id="demo-result" class="mt-3" hidden>
          <div class="alert alert-info" role="alert">
            <strong>Demo mode:</strong> in production this link is emailed.
            <a id="demo-link" href="#" class="d-block mt-2 text-break">Click here to reset your password</a>
          </div>
        </div>

        <p class="mt-3 text-center text-secondary small"><a href="login.html">Back to log in</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { apiForgotPassword } from '../assets/js/api.js';
    import { toastSuccess, toastError } from '../assets/js/ui.toast.js';
    import { esc } from '../assets/js/utils.js';

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const fd = new FormData(e.target);
      const email = fd.get('email');

      try {
        const res = await apiForgotPassword(email);
        toastSuccess(res.message || 'If that email is registered, a reset link has been sent.');

        // Demo mode: backend includes the reset URL since SMTP isn't wired.
        // In production this field is absent and the user checks their email.
        if (res.demo_reset_url) {
          const wrap = document.getElementById('demo-result');
          const link = document.getElementById('demo-link');
          link.href = res.demo_reset_url;
          link.textContent = res.demo_reset_url;
          wrap.hidden = false;
        }
      } catch (err) {
        toastError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
