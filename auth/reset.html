<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="card-body p-4">
        <a href="../index.html" class="auth-card-brand text-dark text-decoration-none fw-bold">
          <img src="../assets/img/logo.png" alt="" class="auth-card-logo">
          <span>WorkBridge PH</span>
        </a>
        <h1 class="h4 mb-2">Reset password</h1>
        <p id="reset-subtitle" class="text-secondary small mb-4">Enter your new password below.</p>

        <div id="invalid-link" class="alert alert-danger" role="alert" hidden>
          This reset link is invalid or has expired.
          <a href="forgot.html" class="d-block mt-2">Request a new link</a>
        </div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label">New password</label>
            <div class="pw-wrap">
              <input type="password" name="password" class="form-input" required minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <div class="pw-wrap">
              <input type="password" name="confirm" class="form-input" required minlength="6" autocomplete="new-password">
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="submit-btn">Reset password</button>
        </form>

        <p class="mt-3 text-center text-secondary small"><a href="login.html">Back to log in</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script>
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.pw-wrap').querySelector('input');
        const icon  = btn.querySelector('i');
        const show  = input.type === 'password';
        input.type  = show ? 'text' : 'password';
        icon.classList.toggle('bi-eye', !show);
        icon.classList.toggle('bi-eye-slash', show);
      });
    });
  </script>
  <script type="module">
    import { apiResetPassword } from '../assets/js/api.js';
    import { toastSuccess, toastError } from '../assets/js/ui.toast.js';
    import { esc } from '../assets/js/utils.js';

    // Read token + email from URL query string (and hash fallback for `serve` clean URLs)
    const search = window.location.search || (window.location.hash ? window.location.hash.slice(1) : '');
    const params = new URLSearchParams(search);
    const token = params.get('token');
    const email = params.get('email');

    const form = document.getElementById('reset-form');
    const subtitle = document.getElementById('reset-subtitle');

    if (!token || !email) {
      // No token in the URL — user landed here directly. Show error and hide form.
      document.getElementById('invalid-link').hidden = false;
      form.hidden = true;
      subtitle.hidden = true;
    } else {
      subtitle.textContent = `Enter a new password for ${email}.`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const password = fd.get('password');
      const confirm  = fd.get('confirm');

      if (password !== confirm) {
        toastError('Passwords do not match.');
        return;
      }
      if (password.length < 6) {
        toastError('Password must be at least 6 characters.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        await apiResetPassword(email, token, password, confirm);
        toastSuccess('Password reset! Redirecting to log in…');
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } catch (err) {
        toastError(err.message);
        btn.disabled = false;
        btn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
