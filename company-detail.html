<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/public.css">
  <link rel="stylesheet" href="assets/css/seeker.css">
</head>
<body>
  <header class="public-nav" id="public-header">
    <div class="public-nav-inner">
      <a href="index.html" class="public-nav-brand"><img src="assets/img/logo.png" alt="" class="public-nav-logo"><span>WorkBridge PH</span></a>
      <ul class="public-nav-links">
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="auth/login.html" class="btn btn-primary">Log in</a></li>
      </ul>
    </div>
  </header>

  <main class="container page-transition py-4">
    <div id="company-content"></div>
  </main>

  <script type="module" src="assets/js/app.js"></script>
  <script type="module">
    import { getCompanyById } from './assets/js/jobs.module.js';
    import { getQueryParams } from './assets/js/router.js';
    import { getCurrentUser } from './assets/js/store.js';
    import { esc, formatSalaryRange, companyAvatar, verifiedBadge, emptyState } from './assets/js/utils.js';

    const params = getQueryParams();
    const user = getCurrentUser();

    if (user) {
      document.getElementById('public-header').style.display = 'none';
      document.body.classList.add('wb-loading');
      const mainEl = document.querySelector('main');
      mainEl.classList.remove('container', 'py-4');
      mainEl.classList.add('app-main');
      const contentWrap = document.createElement('div');
      contentWrap.className = 'app-content';
      while (mainEl.firstChild) contentWrap.appendChild(mainEl.firstChild);
      mainEl.appendChild(contentWrap);
      const appLayout = document.createElement('div');
      appLayout.id = 'app-layout';
      appLayout.className = 'app-layout';
      mainEl.parentNode.insertBefore(appLayout, mainEl);
      appLayout.appendChild(mainEl);
      import('./assets/js/layout.js').then(m => m.renderLayout(user.role, 'Company Detail'));
    }

    const el = document.getElementById('company-content');
    el.innerHTML = '<p class="text-secondary">Loading…</p>';

    getCompanyById(params.id).then(company => {
      document.title = company.name + ' — WorkBridge PH';
      el.innerHTML = `
        <div class="card mb-4">
          <div class="card-body">
            <div class="d-flex gap-3 align-items-start mb-3">
              ${companyAvatar(company, 72)}
              <div style="min-width:0;flex:1">
                <h1 class="mb-1">${esc(company.name)}${verifiedBadge(company, 18)}</h1>
                <p class="text-secondary mb-0">${esc(company.industry || '—')} · ${esc(company.size || '—')} employees · ${esc(company.location || '—')}</p>
              </div>
            </div>
            ${(company.verifiedStatus || company.verified_status) === 'Verified' ? '<span class="badge badge-verified mb-3"><i class="bi bi-patch-check-fill me-1"></i>Verified</span>' : ''}
            <p>${esc(company.description || '')}</p>
            ${company.website ? `<a href="${esc(company.website)}" class="btn btn-secondary" target="_blank">Visit Website</a>` : ''}
          </div>
        </div>
        <h3 class="mb-3">Open Positions (${company.openJobs?.length || 0})</h3>
        <div id="company-jobs" class="jobs-grid"></div>
      `;
      const jobsEl = document.getElementById('company-jobs');
      const jobs = company.openJobs || [];
      jobsEl.innerHTML = jobs.length === 0
        ? emptyState({
            icon: 'briefcase',
            title: 'No open positions at the moment',
            subtitle: 'This company is not actively hiring. Check back soon.',
          })
        : jobs.map(j => `
            <a href="job-detail.html?id=${esc(j.id)}" class="job-card card-lift text-decoration-none text-dark">
              <h3 class="job-card-title">${esc(j.title)}</h3>
              <div class="job-card-meta">
                <span><i class="bi bi-geo-alt"></i> ${esc(j.location)}</span>
                <span><i class="bi bi-briefcase"></i> ${esc(j.type)}</span>
              </div>
              <p class="job-card-salary mb-0">${formatSalaryRange(j.salaryMin, j.salaryMax)}</p>
            </a>
          `).join('');
    }).catch(() => {
      el.innerHTML = '<div class="empty-state"><p>Company not found.</p><a href="companies.html">Browse companies</a></div>';
    });
  </script>
</body>
</html>
