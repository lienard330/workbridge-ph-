<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="mb-0">Notifications</h1>
          <button id="mark-all" class="btn btn-ghost btn-sm">Mark all read</button>
        </div>
        <div id="notif-list"><p class="text-secondary">Loading…</p></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiGetNotifications, apiMarkNotificationRead, apiMarkAllNotificationsRead } from '../assets/js/api.js';
    import { toastError } from '../assets/js/ui.toast.js';
    import { esc, emptyState } from '../assets/js/utils.js';

    renderLayout('seeker', 'Notifications');

    let notifs = [];

    function render() {
      const list = document.getElementById('notif-list');
      if (!notifs.length) {
        list.innerHTML = emptyState({
          icon: 'bell',
          title: 'No notifications yet',
          subtitle: 'Application updates and messages from employers will show up here.',
        });
        return;
      }
      list.innerHTML = notifs.map(n => `
        <div class="card mb-2 ${n.is_read ? '' : 'border-primary'}">
          <div class="card-body d-flex justify-content-between align-items-start">
            <div>
              <h5 class="mb-1">${esc(n.title)}</h5>
              <p class="mb-0 text-secondary small">${esc(n.body)}</p>
              <p class="mb-0 text-muted" style="font-size:var(--text-xs)">${new Date(n.created_at).toLocaleString()}</p>
            </div>
            ${!n.is_read ? `<button class="btn btn-ghost btn-sm mark-read ms-2 flex-shrink-0" data-id="${esc(String(n.id))}">Mark read</button>` : '<span class="text-muted small ms-2">Read</span>'}
          </div>
        </div>`).join('');

      list.querySelectorAll('.mark-read').forEach(b => {
        b.onclick = async () => {
          try {
            await apiMarkNotificationRead(b.dataset.id);
            notifs = notifs.map(n => String(n.id) === b.dataset.id ? { ...n, is_read: true } : n);
            render();
          } catch (err) { toastError(err.message); }
        };
      });
    }

    document.getElementById('mark-all').onclick = async () => {
      try {
        await apiMarkAllNotificationsRead();
        notifs = notifs.map(n => ({ ...n, is_read: true }));
        render();
      } catch (err) { toastError(err.message); }
    };

    apiGetNotifications()
      .then(res => { notifs = res.data || res; render(); })
      .catch(err => { document.getElementById('notif-list').innerHTML = `<p class="text-danger">${esc(err.message)}</p>`; });
  </script>
</body>
</html>
