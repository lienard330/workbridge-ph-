<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Resume</h1>
        <div class="card mb-4">
          <div class="card-body">
            <h3 class="mb-3">Upload Resume</h3>
            <input type="file" id="resume-file" accept=".pdf,.doc,.docx" class="form-input mb-2">
            <button id="upload-btn" class="btn btn-primary">Upload</button>
          </div>
        </div>
        <h3 class="mb-3">My Resumes</h3>
        <div id="resume-list"></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiSeekerProfile, apiUploadResume, apiDeleteResume, apiDownloadResume } from '../assets/js/api.js';
    import { toastSuccess, toastError } from '../assets/js/ui.toast.js';
    import { esc, emptyState } from '../assets/js/utils.js';

    renderLayout('seeker', 'Resume');

    let resumes = [];

    function render() {
      const list = document.getElementById('resume-list');
      if (!resumes.length) {
        list.innerHTML = emptyState({
          icon: 'file-earmark-pdf',
          title: 'No resumes uploaded yet',
          subtitle: 'Upload your resume above so employers can review your applications.',
        });
        return;
      }
      list.innerHTML = resumes.map(r => `
        <div class="card mb-2">
          <div class="card-body d-flex flex-wrap gap-2 justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2" style="min-width:0;flex:1 1 auto">
              <i class="bi bi-file-earmark-pdf text-danger flex-shrink-0"></i>
              <span class="text-truncate" title="${esc(r.original_name || r.name)}">${esc(r.original_name || r.name)}</span>
              ${r.is_primary ? '<span class="badge badge-teal flex-shrink-0">Primary</span>' : ''}
            </div>
            <div class="d-flex gap-2 flex-shrink-0">
              <button class="btn btn-ghost btn-sm download-resume" data-id="${esc(String(r.id))}" data-name="${esc(r.original_name || 'resume')}">
                <i class="bi bi-download"></i> Download
              </button>
              <button class="btn btn-ghost btn-sm text-danger remove-resume" data-id="${esc(String(r.id))}">Remove</button>
            </div>
          </div>
        </div>`).join('');

      list.querySelectorAll('.download-resume').forEach(b => {
        b.onclick = async () => {
          b.disabled = true;
          try {
            await apiDownloadResume(b.dataset.id, b.dataset.name);
          } catch (err) { toastError(err.message); }
          finally { b.disabled = false; }
        };
      });

      list.querySelectorAll('.remove-resume').forEach(b => {
        b.onclick = async () => {
          b.disabled = true;
          try {
            await apiDeleteResume(b.dataset.id);
            toastSuccess('Resume removed');
            resumes = resumes.filter(r => String(r.id) !== b.dataset.id);
            render();
          } catch (err) { toastError(err.message); b.disabled = false; }
        };
      });
    }

    document.getElementById('upload-btn').onclick = async () => {
      const input = document.getElementById('resume-file');
      const file = input.files[0];
      if (!file) { toastError('Select a file first'); return; }
      const btn = document.getElementById('upload-btn');
      btn.disabled = true; btn.textContent = 'Uploading…';
      try {
        const r = await apiUploadResume(file);
        resumes.push(r);
        toastSuccess('Resume uploaded');
        input.value = '';
        render();
      } catch (err) { toastError(err.message); }
      finally { btn.disabled = false; btn.textContent = 'Upload'; }
    };

    apiSeekerProfile().then(p => { resumes = p.resumes || []; render(); });
  </script>
</body>
</html>
