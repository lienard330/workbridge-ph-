<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Applications</h1>
        <div class="chip-group mb-4">
          <button class="chip active" data-status="">All</button>
          <button class="chip" data-status="Submitted">Submitted</button>
          <button class="chip" data-status="Reviewed">Reviewed</button>
          <button class="chip" data-status="Interview">Interview</button>
          <button class="chip" data-status="Rejected">Rejected</button>
          <button class="chip" data-status="Hired">Hired</button>
        </div>
        <div id="applications-list"></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { getMyApplications } from '../assets/js/seeker.module.js';
    import { esc, emptyState } from '../assets/js/utils.js';

    renderLayout('seeker', 'Applications');

    let allApps = [], statusFilter = '';

    function render() {
      const list = document.getElementById('applications-list');
      document.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', c.dataset.status === statusFilter);
        c.onclick = () => { statusFilter = c.dataset.status; render(); };
      });

      const apps = statusFilter ? allApps.filter(a => a.status === statusFilter) : allApps;
      if (!apps.length) {
        list.innerHTML = emptyState({
          icon: 'file-earmark-text',
          title: statusFilter ? `No ${statusFilter.toLowerCase()} applications` : 'No applications yet',
          subtitle: 'Apply to jobs you like and track their progress here.',
          actionLabel: 'Browse jobs',
          actionHref: '../jobs.html',
        });
        return;
      }
      list.innerHTML = apps.map(a => `
        <a href="application-detail.html?id=${esc(a.id)}" class="card card-lift text-decoration-none text-dark mb-3">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h4 class="mb-1">${esc(a.job?.title || 'Job')}</h4>
              <p class="text-secondary small mb-1">${esc(a.job?.company?.name || 'Company')} · Applied ${new Date(a.appliedAt).toLocaleDateString()}</p>
              <span class="badge badge-${esc(a.status.toLowerCase())}">${esc(a.status)}</span>
            </div>
            <i class="bi bi-chevron-right"></i>
          </div>
        </a>
      `).join('');
    }

    const list = document.getElementById('applications-list');
    list.innerHTML = '<p class="text-secondary">Loading…</p>';
    getMyApplications().then(apps => { allApps = apps; render(); })
      .catch(() => { list.innerHTML = '<p class="text-danger">Could not load applications.</p>'; });
  </script>
</body>
</html>
