<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Categories — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/public.css">
</head>
<body>
  <header class="public-nav" id="public-header">
    <div class="public-nav-inner">
      <a href="index.html" class="public-nav-brand"><img src="assets/img/logo.png" alt="" class="public-nav-logo"><span>WorkBridge PH</span></a>
      <ul class="public-nav-links">
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="help.html">Help</a></li>
        <li><a href="auth/login.html" class="btn btn-primary">Log in</a></li>
      </ul>
    </div>
  </header>

  <main class="container page-transition py-4">
    <div class="text-center mb-4">
      <h1>Browse Jobs by Category</h1>
      <p class="text-secondary mx-auto" style="max-width:620px">
        Find work that matches your field — from professional and office roles to healthcare, trades, and service work.
      </p>
    </div>

    <div id="categories-content">
      <p class="text-secondary text-center py-4">Loading categories…</p>
    </div>

    <div class="text-center mt-5 pt-3" style="border-top:1px solid var(--color-border)">
      <p class="text-secondary mb-2">Don't see your field?</p>
      <a href="jobs.html" class="btn btn-secondary">Browse all jobs</a>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="assets/js/app.js"></script>
  <script type="module">
    import { apiGetCategories } from './assets/js/api.js';
    import { esc } from './assets/js/utils.js';

    /**
     * Bucket categories per the proposal's three-way classification:
     *   Professional / Healthcare / Service.
     * Categories whose slug isn't listed land in "Other Fields".
     */
    const BUCKETS = [
      {
        title: 'Professional & Office',
        subtitle: 'Office-based roles in technology, business, education, and the public sector.',
        icon: 'bi-briefcase',
        slugs: ['it', 'business', 'engineering', 'education', 'government', 'arts'],
      },
      {
        title: 'Healthcare & Skilled Trades',
        subtitle: 'Medical professionals, technicians, and licensed trade workers.',
        icon: 'bi-heart-pulse',
        slugs: ['healthcare'],
      },
      {
        title: 'Service & Hospitality',
        subtitle: 'Customer service, hospitality, household, and tourism roles.',
        icon: 'bi-cup-hot',
        slugs: ['hospitality'],
      },
    ];

    const el = document.getElementById('categories-content');

    apiGetCategories().then(res => {
      const cats = res.data || res;

      if (!cats.length) {
        el.innerHTML = '<p class="text-secondary text-center py-4">No categories available yet.</p>';
        return;
      }

      // Build a slug → category map for quick bucket assignment
      const bySlug = {};
      cats.forEach(c => { bySlug[c.slug] = c; });

      // Track which slugs we've placed so we can spot leftovers
      const placed = new Set();

      const sectionsHtml = BUCKETS.map(bucket => {
        const items = bucket.slugs.map(s => bySlug[s]).filter(Boolean);
        if (!items.length) return '';
        items.forEach(c => placed.add(c.slug));
        return renderBucket(bucket, items);
      }).join('');

      // Anything not in our predefined buckets goes here. Future-proofs the page
      // when admins add new categories that don't match the three-way split.
      const leftovers = cats.filter(c => !placed.has(c.slug));
      const leftoverHtml = leftovers.length
        ? renderBucket(
            { title: 'Other Fields', subtitle: 'Additional industries on WorkBridge PH.', icon: 'bi-tags' },
            leftovers
          )
        : '';

      el.innerHTML = sectionsHtml + leftoverHtml;
    }).catch(err => {
      el.innerHTML = `<p class="text-danger text-center py-4">Could not load categories: ${esc(err.message)}</p>`;
    });

    function renderBucket(bucket, items) {
      return `
        <section class="mb-5">
          <div class="d-flex align-items-center gap-2 mb-3">
            <i class="bi ${esc(bucket.icon)} fs-3 text-primary"></i>
            <div>
              <h2 class="mb-0 h4">${esc(bucket.title)}</h2>
              <p class="text-secondary small mb-0">${esc(bucket.subtitle)}</p>
            </div>
          </div>
          <div class="row g-3">
            ${items.map(c => renderCard(c)).join('')}
          </div>
        </section>`;
    }

    function renderCard(c) {
      const count = c.job_listings_count ?? 0;
      const countLabel = count === 1 ? '1 open job' : `${count} open jobs`;
      return `
        <div class="col-md-6 col-lg-4">
          <a href="jobs.html?category=${esc(String(c.id))}" class="job-card text-decoration-none text-dark d-block h-100">
            <div class="d-flex align-items-center gap-3 mb-2">
              <span class="d-inline-flex align-items-center justify-content-center"
                style="width:44px;height:44px;border-radius:10px;background:var(--color-accent-muted);color:var(--color-accent);font-size:1.25rem">
                <i class="bi ${esc(c.icon || 'bi-tag')}"></i>
              </span>
              <h3 class="job-card-title mb-0">${esc(c.name)}</h3>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <span class="text-secondary small">${esc(countLabel)}</span>
              <span class="text-primary small">Browse <i class="bi bi-arrow-right"></i></span>
            </div>
          </a>
        </div>`;
    }
  </script>
</body>
</html>
