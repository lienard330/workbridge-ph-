<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Logs — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Audit Logs</h1>
        <div class="card mb-4">
          <div class="card-body">
            <input type="text" id="filter-action" class="form-input me-2" placeholder="Filter by action" style="max-width:200px">
            <button id="apply-filter" class="btn btn-secondary">Filter</button>
          </div>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Actor</th><th>Action</th><th>Target</th><th>Timestamp</th></tr></thead>
              <tbody id="logs-tbody"><tr><td colspan="4" class="text-secondary">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiAdminAuditLogs } from '../assets/js/api.js';
    import { esc, skeletonTableRows } from '../assets/js/utils.js';

    renderLayout('admin', 'Audit Logs');
    document.getElementById('logs-tbody').innerHTML = skeletonTableRows(5, 4);

    let allLogs = [];

    function render() {
      const q = (document.getElementById('filter-action').value || '').toLowerCase();
      const logs = q ? allLogs.filter(l => (l.action || '').toLowerCase().includes(q)) : allLogs;
      const tbody = document.getElementById('logs-tbody');
      if (!logs.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-secondary">No logs found.</td></tr>'; return; }
      tbody.innerHTML = logs.map(l => {
        const actor = l.actor?.name || l.actor_email || '—';
        return `<tr><td>${esc(actor)}</td><td>${esc(l.action)}</td><td>${esc(l.target_type + ':' + l.target_id)}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`;
      }).join('');
    }

    document.getElementById('apply-filter').onclick = render;

    apiAdminAuditLogs().then(res => {
      allLogs = res.data || res;
      render();
    }).catch(err => {
      document.getElementById('logs-tbody').innerHTML = `<tr><td colspan="4" class="text-danger">${esc(err.message)}</td></tr>`;
    });
  </script>
</body>
</html>
