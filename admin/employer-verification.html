<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Verification — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Employer Verification</h1>
        <div class="card mb-4">
          <div class="card-body">
            <input type="text" id="search-company" class="form-input me-2" placeholder="Company" style="max-width:200px">
            <select id="filter-status" class="form-select" style="max-width:150px">
              <option value="">All</option>
              <option value="Pending">Pending</option>
              <option value="Verified">Verified</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Company</th><th>Type</th><th>Location</th><th>Status</th></tr></thead>
              <tbody id="verify-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/app.js"></script>
  <script type="module" src="../assets/js/admin-verification.js"></script>
</body>
</html>
