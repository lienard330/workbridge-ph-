<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Detail — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <a href="reports.html" class="btn btn-ghost btn-sm mb-3"><i class="bi bi-arrow-left"></i> Back</a>
        <div id="report-detail" class="card"><div class="card-body"><p class="text-secondary">Loading…</p></div></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiAdminReports, apiAdminResolveReport } from '../assets/js/api.js';
    import { getQueryParams } from '../assets/js/router.js';
    import { toastSuccess, toastError } from '../assets/js/ui.toast.js';
    import { esc } from '../assets/js/utils.js';

    renderLayout('admin', 'Report Detail');

    const params = getQueryParams();
    const el = document.getElementById('report-detail');

    if (!params.id) {
      el.innerHTML = '<div class="card-body"><p>Not found.</p></div>';
    } else {
      apiAdminReports().then(res => {
        const reports = res.data || res;
        const r = reports.find(x => String(x.id) === params.id);
        if (!r) { el.innerHTML = '<div class="card-body"><p>Report not found.</p></div>'; return; }

        const badgeCls = r.status === 'Open' ? 'pending' : r.status === 'Resolved' ? 'verified' : 'rejected';
        el.innerHTML = `
          <div class="card-header"><h2 class="card-title mb-0">${esc(r.report_type || r.type || 'Report')}</h2></div>
          <div class="card-body">
            <p><strong>Status:</strong> <span class="badge badge-${badgeCls}">${esc(r.status)}</span></p>
            <p><strong>Reporter:</strong> ${esc(r.reporter?.name || '—')}</p>
            <p><strong>Reason:</strong> ${esc(r.reason || '—')}</p>
            ${r.description ? `<p><strong>Description:</strong> ${esc(r.description)}</p>` : ''}
            <p><strong>Date:</strong> ${new Date(r.created_at).toLocaleString()}</p>
            ${r.status !== 'Open' ? `<p><strong>Resolution note:</strong> ${esc(r.resolution_note || '—')}</p>` : ''}
            ${r.status === 'Open' ? `
              <div class="mt-4">
                <label class="form-label">Resolution note (optional)</label>
                <textarea id="res-notes" class="form-textarea mb-2" rows="3" placeholder="Add a note…"></textarea>
                <div class="d-flex gap-2">
                  <button id="btn-resolve" class="btn btn-success">Mark Resolved</button>
                  <button id="btn-dismiss" class="btn btn-secondary">Dismiss</button>
                </div>
              </div>` : ''}
          </div>`;

        if (r.status === 'Open') {
          async function doResolve(status) {
            const note = document.getElementById('res-notes').value.trim();
            try {
              await apiAdminResolveReport(r.id, status, note || null);
              toastSuccess('Report ' + status.toLowerCase());
              setTimeout(() => location.href = 'reports.html', 800);
            } catch (err) { toastError(err.message); }
          }
          document.getElementById('btn-resolve').onclick = () => doResolve('Resolved');
          document.getElementById('btn-dismiss').onclick = () => doResolve('Dismissed');
        }
      }).catch(err => {
        el.innerHTML = `<div class="card-body"><p class="text-danger">${esc(err.message)}</p></div>`;
      });
    }
  </script>
</body>
</html>
