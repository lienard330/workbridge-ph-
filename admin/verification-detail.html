<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Employer — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <div id="verify-detail"><p class="text-secondary">Loading…</p></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiAdminVerifications, apiAdminVerifyCompany } from '../assets/js/api.js';
    import { getQueryParams } from '../assets/js/router.js';
    import { toastSuccess, toastError } from '../assets/js/ui.toast.js';
    import { esc } from '../assets/js/utils.js';

    renderLayout('admin', 'Review Employer');

    const params = getQueryParams();
    const el = document.getElementById('verify-detail');

    if (!params.id) {
      el.innerHTML = '<div class="empty-state"><p>Not found.</p></div>';
    } else {
      apiAdminVerifications().then(res => {
        const companies = res.data || res;
        const co = companies.find(c => String(c.id) === params.id);

        if (!co) {
          el.innerHTML = '<div class="empty-state"><p>Company not found or already reviewed.</p><a href="employer-verification.html" class="btn btn-ghost btn-sm mt-2">Back</a></div>';
          return;
        }

        const docs = co.verification_documents || [];
        el.innerHTML = `
          <a href="employer-verification.html" class="btn btn-ghost btn-sm mb-3"><i class="bi bi-arrow-left"></i> Back</a>
          <div class="card mb-4">
            <div class="card-header"><h2 class="card-title mb-0">Review: ${esc(co.name)}</h2></div>
            <div class="card-body">
              <p><strong>Status:</strong> <span class="badge badge-pending">${esc(co.verified_status)}</span></p>
              <p><strong>Industry:</strong> ${esc(co.industry || '—')}</p>
              <p><strong>Location:</strong> ${esc([co.city, co.province].filter(Boolean).join(', ') || '—')}</p>
              <p><strong>Contact:</strong> ${esc(co.user?.email || '—')}</p>
              ${docs.length ? `<div class="mt-3"><strong>Submitted Documents:</strong><ul class="mt-1">${docs.map(d => `<li>${esc(d.doc_type || 'Document')} — <a href="${esc(d.file_path)}" target="_blank">View</a></li>`).join('')}</ul></div>` : '<p class="text-muted small">No documents submitted yet.</p>'}
              <div class="form-group mt-4">
                <label class="form-label">Notes (optional)</label>
                <textarea id="verify-notes" class="form-textarea" rows="3" placeholder="Add a review note…"></textarea>
              </div>
              <div class="mt-4 d-flex gap-2">
                <button id="btn-verify" class="btn btn-success">Verify</button>
                <button id="btn-reject" class="btn btn-warning">Reject</button>
                <button id="btn-suspend" class="btn btn-danger">Suspend</button>
              </div>
            </div>
          </div>`;

        async function doAction(status) {
          const note = document.getElementById('verify-notes').value.trim();
          ['btn-verify','btn-reject','btn-suspend'].forEach(id => { document.getElementById(id).disabled = true; });
          try {
            await apiAdminVerifyCompany(co.id, status, note || null);
            toastSuccess('Company status updated to ' + status);
            setTimeout(() => location.href = 'employer-verification.html', 800);
          } catch (err) {
            toastError(err.message);
            ['btn-verify','btn-reject','btn-suspend'].forEach(id => { document.getElementById(id).disabled = false; });
          }
        }

        document.getElementById('btn-verify').onclick  = () => doAction('Verified');
        document.getElementById('btn-reject').onclick  = () => doAction('Rejected');
        document.getElementById('btn-suspend').onclick = () => doAction('Suspended');
      }).catch(err => {
        el.innerHTML = `<div class="empty-state"><p class="text-danger">${esc(err.message)}</p></div>`;
      });
    }
  </script>
</body>
</html>
