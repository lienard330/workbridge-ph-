<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Reports</h1>
        <div class="card mb-4">
          <div class="card-body">
            <select id="f-status" class="form-select d-inline-block" style="max-width:140px">
              <option value="">All</option>
              <option value="Open">Open</option>
              <option value="Resolved">Resolved</option>
              <option value="Dismissed">Dismissed</option>
            </select>
          </div>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Type</th><th>Reason</th><th>Reporter</th><th>Status</th><th>Date</th></tr></thead>
              <tbody id="reports-tbody"><tr><td colspan="5" class="text-secondary">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiAdminReports } from '../assets/js/api.js';
    import { esc, skeletonTableRows } from '../assets/js/utils.js';

    renderLayout('admin', 'Reports');
    document.getElementById('reports-tbody').innerHTML = skeletonTableRows(5, 5);

    let reports = [];

    function render() {
      const status = document.getElementById('f-status').value;
      const list = status ? reports.filter(r => r.status === status) : reports;
      const tbody = document.getElementById('reports-tbody');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-secondary">No reports found.</td></tr>'; return; }
      tbody.innerHTML = list.map(r => {
        const badgeCls = r.status === 'Open' ? 'pending' : r.status === 'Resolved' ? 'verified' : 'rejected';
        return `<tr style="cursor:pointer" onclick="location.href='report-detail.html?id=${esc(String(r.id))}'">
          <td>${esc(r.report_type || r.type || '—')}</td>
          <td>${esc(r.reason || '—')}</td>
          <td>${esc(r.reporter?.name || '—')}</td>
          <td><span class="badge badge-${badgeCls}">${esc(r.status)}</span></td>
          <td>${new Date(r.created_at).toLocaleDateString()}</td>
        </tr>`;
      }).join('');
    }

    document.getElementById('f-status').onchange = render;

    apiAdminReports().then(res => { reports = res.data || res; render(); })
      .catch(err => { document.getElementById('reports-tbody').innerHTML = `<tr><td colspan="5" class="text-danger">${esc(err.message)}</td></tr>`; });
  </script>
</body>
</html>
