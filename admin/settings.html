<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Settings</h1>
        <div class="card">
          <div class="card-body">
            <h3 class="mb-3">Dark Mode</h3>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="dark-mode">
              <label class="form-check-label" for="dark-mode">Enable dark mode</label>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { getTheme } from '../assets/js/store.js';
    import { toggleDarkMode } from '../assets/js/app.js';

    renderLayout('admin', 'Settings');
    const dm = document.getElementById('dark-mode');
    dm.checked = getTheme() === 'dark';
    dm.onchange = () => { toggleDarkMode(); dm.checked = document.documentElement.getAttribute('data-theme') === 'dark'; };
  </script>
</body>
</html>
