<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/seeker.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="wb-loading">
  <div id="app-layout" class="app-layout">
    <main class="app-main">
      <div class="app-content">
        <h1 class="mb-4">Analytics</h1>

        <!-- Top-line counters -->
        <div class="row g-3 mb-4">
          <div class="col-md-3">
            <div class="stat-card card">
              <div class="stat-value" id="total-users">—</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card">
              <div class="stat-value" id="total-jobs">—</div>
              <div class="stat-label">Total Jobs</div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card">
              <div class="stat-value" id="total-companies">—</div>
              <div class="stat-label">Companies</div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card">
              <div class="stat-value" id="open-jobs">—</div>
              <div class="stat-label">Open Jobs</div>
            </div>
          </div>
        </div>

        <!-- Charts row 1: composition donuts -->
        <div class="row g-3 mb-4">
          <div class="col-lg-6">
            <div class="card h-100">
              <div class="card-header"><h3 class="card-title mb-0">Users by Role</h3></div>
              <div class="card-body">
                <div style="position:relative;height:280px"><canvas id="chart-users-role"></canvas></div>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card h-100">
              <div class="card-header"><h3 class="card-title mb-0">Companies by Verification</h3></div>
              <div class="card-body">
                <div style="position:relative;height:280px"><canvas id="chart-companies-verif"></canvas></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Charts row 2: pipeline + jobs -->
        <div class="row g-3 mb-4">
          <div class="col-lg-6">
            <div class="card h-100">
              <div class="card-header"><h3 class="card-title mb-0">Applications Pipeline</h3></div>
              <div class="card-body">
                <div style="position:relative;height:280px"><canvas id="chart-apps-status"></canvas></div>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card h-100">
              <div class="card-header"><h3 class="card-title mb-0">Jobs by Status</h3></div>
              <div class="card-body">
                <div style="position:relative;height:280px"><canvas id="chart-jobs-status"></canvas></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Chart.js for visualizations. ~60KB; loaded once. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { renderLayout } from '../assets/js/layout.js';
    import { apiAdminDashboard } from '../assets/js/api.js';

    renderLayout('admin', 'Analytics');

    // Brand palette tied to the design tokens — keeps charts consistent with the rest of the UI.
    const PALETTE = {
      primary:   '#4F46E5',  // indigo / accent
      teal:      '#0D9488',  // verified
      amber:     '#F59E0B',  // pending
      rose:      '#E11D48',  // rejected
      slate:     '#64748B',  // neutral
      emerald:   '#10B981',  // hired/success
      sky:       '#0EA5E9',  // info / interview
      violet:    '#8B5CF6',
    };

    function donut(ctx, labels, data, colors) {
      return new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: { position: 'bottom', labels: { padding: 16, boxWidth: 12, font: { size: 12 } } },
            tooltip: { callbacks: { label: (c) => `${c.label}: ${c.parsed}` } },
          },
        },
      });
    }

    function bar(ctx, labels, data, colors) {
      return new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 6, borderWidth: 0 }] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: 'rgba(0,0,0,0.05)' } },
            x: { grid: { display: false } },
          },
        },
      });
    }

    apiAdminDashboard().then(d => {
      // Top-line counters
      document.getElementById('total-users').textContent     = d.total_users ?? '—';
      document.getElementById('total-jobs').textContent      = d.total_jobs ?? '—';
      document.getElementById('total-companies').textContent = d.total_companies ?? '—';
      document.getElementById('open-jobs').textContent       = d.open_jobs ?? '—';

      // Users by role — doughnut
      const roles = d.users_by_role || {};
      donut(
        document.getElementById('chart-users-role'),
        ['Seekers', 'Employers', 'Admins'],
        [roles.seeker || 0, roles.employer || 0, roles.admin || 0],
        [PALETTE.primary, PALETTE.teal, PALETTE.violet]
      );

      // Companies by verification — doughnut
      const verif = d.companies_by_verification || {};
      donut(
        document.getElementById('chart-companies-verif'),
        ['Verified', 'Pending', 'Rejected', 'Suspended', 'Unverified'],
        [verif.Verified || 0, verif.Pending || 0, verif.Rejected || 0, verif.Suspended || 0, verif.Unverified || 0],
        [PALETTE.teal, PALETTE.amber, PALETTE.rose, PALETTE.slate, PALETTE.slate]
      );

      // Applications pipeline — doughnut (status order matches lifecycle)
      const apps = d.applications_by_status || {};
      donut(
        document.getElementById('chart-apps-status'),
        ['Pending', 'Reviewing', 'Interview', 'Hired', 'Rejected'],
        [apps.Pending || 0, apps.Reviewing || 0, apps.Interview || 0, apps.Hired || 0, apps.Rejected || 0],
        [PALETTE.amber, PALETTE.sky, PALETTE.violet, PALETTE.emerald, PALETTE.rose]
      );

      // Jobs by status — bar
      const jobs = d.jobs_by_status || {};
      bar(
        document.getElementById('chart-jobs-status'),
        ['Open', 'Draft', 'Closed'],
        [jobs.Open || 0, jobs.Draft || 0, jobs.Closed || 0],
        [PALETTE.teal, PALETTE.amber, PALETTE.slate]
      );
    }).catch(err => {
      console.error('Failed to load analytics', err);
    });
  </script>
</body>
</html>
